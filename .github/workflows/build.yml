name: Build QunarJBBypass
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # йђў?Xcode й‘·оЃ„з”« SDKй”›е±јз¬‰й—‡в‚¬з‘•дЅёеґџйђ™оѓїз¬…жќћ?          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK=$SDK"
          ln -sf "$SDK" $HOME/theos/sdks/iPhoneOS16.0.sdk 2>/dev/null || true
          ls $HOME/theos/sdks/

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass.deb
          path: packages/*.deb
