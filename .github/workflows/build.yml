name: Build QunarJBBypass
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # 下载 SDK
          curl -L -o $HOME/theos/sdks/iPhoneOS16.0.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master/iPhoneOS16.0.sdk.tar.xz
          cd $HOME/theos/sdks && tar -xf iPhoneOS16.0.sdk.tar.xz

      - name: Build Tweak  
        run: |
          sed -i '' 's/latest/16.0/' Makefile
          make package FINALPACKAGE=1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass.deb
          path: packages/*.deb
