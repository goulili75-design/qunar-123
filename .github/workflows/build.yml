name: Build QunarJBBypass
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # Xcode SDK
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          ln -sf "$SDK" $HOME/theos/sdks/iPhoneOS16.0.sdk
          # зАєе§ОоЧК dpkg (dm.pl йЧЗвВђзСХ?
          brew install dpkg ldid 2>/dev/null || true
          # зЇ≠оЖїзєЪ perl е¶ѓвА≥жљ°йНЩоИЬжХ§
          export PATH=$HOME/theos/bin:$PATH

      - name: Build Tweak
        run: |
          export PATH=$HOME/theos/bin:$PATH
          make package FINALPACKAGE=1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass.deb
          path: packages/*.deb
