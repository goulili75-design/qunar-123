name: Build QunarJBBypass DEB
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -isysroot "$SDK" -miphoneos-version-min=15.0 -dynamiclib -fobjc-arc -framework Foundation -framework UIKit -o QunarJBBypass.dylib Tweak.m
          # Also build bare minimal test
          clang -arch arm64 -isysroot "$SDK" -miphoneos-version-min=15.0 -dynamiclib -o Bare.dylib Bare.m
          ls -la QunarJBBypass.dylib Bare.dylib

      - name: Package DEB
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/var/jb/Library/MobileSubstrate/DynamicLibraries
          
          cp QunarJBBypass.dylib deb/var/jb/Library/MobileSubstrate/DynamicLibraries/
          
          # plist in NeXTSTEP format
          echo '{Filter={Bundles=("com.qunar.iphoneclient8");};}' > deb/var/jb/Library/MobileSubstrate/DynamicLibraries/QunarJBBypass.plist
          
          # control file
          echo 'Package: com.qunar.bypass
          Name: QunarJBBypass
          Version: 1.0
          Architecture: iphoneos-arm64
          Description: Qunar jailbreak bypass
          Maintainer: qunar
          Section: Tweaks' > deb/DEBIAN/control
          
          # postinst
          echo '#!/bin/sh
          chmod 755 /var/jb/Library/MobileSubstrate/DynamicLibraries/QunarJBBypass.dylib
          killall -9 QunariPhone_Cook_CM 2>/dev/null
          echo "QunarJBBypass installed"
          exit 0' > deb/DEBIAN/postinst
          chmod +x deb/DEBIAN/postinst
          
          # Build deb
          brew install dpkg 2>/dev/null || true
          dpkg-deb --root-owner-group -b deb QunarJBBypass.deb
          ls -la QunarJBBypass.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass.deb
          path: QunarJBBypass.deb

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass.dylib
          path: QunarJBBypass.dylib
