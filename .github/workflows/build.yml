name: Build QunarJBBypass
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -x objective-c -isysroot "$SDK" -miphoneos-version-min=15.0 -dynamiclib -framework Foundation -lobjc -o QunarJBBypass.dylib Tweak.m
          ls -la QunarJBBypass.dylib

      - name: Package (tar.gz)
        run: |
          mkdir -p QunarJBBypass/Library/MobileSubstrate/DynamicLibraries
          cp QunarJBBypass.dylib QunarJBBypass/Library/MobileSubstrate/DynamicLibraries/
          echo '<?xml version="1.0"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>Filter</key><dict><key>Bundles</key><array><string>com.qunar.iphoneclient8</string></array></dict></dict></plist>' > QunarJBBypass/Library/MobileSubstrate/DynamicLibraries/QunarJBBypass.plist
          tar czf QunarJBBypass.tar.gz QunarJBBypass/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass
          path: QunarJBBypass.tar.gz
