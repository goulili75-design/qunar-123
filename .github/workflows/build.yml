name: Build QunarJBBypass
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -isysroot "$SDK" -miphoneos-version-min=15.0 -dynamiclib -fobjc-arc -framework Foundation -o QunarJBBypass.dylib Tweak.m
          clang -arch arm64 -isysroot "$SDK" -miphoneos-version-min=15.0 -dynamiclib -o Bare.dylib Bare.m
          ls -la QunarJBBypass.dylib Bare.dylib

      - name: Upload Dylibs
        uses: actions/upload-artifact@v4
        with:
          name: Dylibs
          path: |
            QunarJBBypass.dylib
            Bare.dylib
