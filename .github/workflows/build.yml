name: Build QunarJBBypass
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile
        run: |
          set -x
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          clang -v -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -dynamiclib \
            -framework Foundation \
            -o QunarJBBypass.dylib \
            Tweak.m 2>&1
          echo "EXIT: $?"
          ls -la QunarJBBypass.dylib 2>/dev/null || echo "FAILED"

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass
          path: QunarJBBypass.dylib
