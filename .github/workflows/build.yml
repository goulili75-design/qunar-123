name: Build QunarJBBypass
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -arch arm64e \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -dynamiclib \
            -framework Foundation -framework UIKit \
            -o QunarJBBypass.dylib \
            Tweak.x
          echo "Dylib compiled"
          ls -la QunarJBBypass.dylib

      - name: Sign
        run: |
          brew install ldid 2>/dev/null || true
          ldid -S QunarJBBypass.dylib
          echo "Signed"

      - name: Package deb
        run: |
          brew install dpkg 2>/dev/null || true
          mkdir -p deb/var/jb/Library/MobileSubstrate/DynamicLibraries
          cp QunarJBBypass.dylib deb/var/jb/Library/MobileSubstrate/DynamicLibraries/
          
          # plist
          cat > deb/var/jb/Library/MobileSubstrate/DynamicLibraries/QunarJBBypass.plist << 'PLEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Filter</key>
              <dict>
                  <key>Bundles</key>
                  <array>
                      <string>com.qunar.iphoneclient8</string>
                  </array>
              </dict>
          </dict>
          </plist>
          PLEOF
          
          # control
          mkdir -p deb/DEBIAN
          cat > deb/DEBIAN/control << 'EOF'
          Package: com.qunarjbb
          Name: QunarJBBypass
          Version: 1.0
          Architecture: iphoneos-arm64
          Description: Qunar jailbreak bypass
          Maintainer: qunar
          Section: Tweaks
          EOF
          
          dpkg-deb -b deb QunarJBBypass.deb
          echo "DEB created"
          ls -la QunarJBBypass.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: QunarJBBypass.deb
          path: QunarJBBypass.deb
